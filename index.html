<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}
.dashboard-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; border: none; cursor: pointer; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.card-dash span { font-size: 0.8em; color: #555; }
.card-dash b { display:block; font-size:1.2em; color:var(--p); margin-top: 5px; }
.list-item { background:#fff; padding:12px; margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; gap:10px; cursor:pointer; }
.prod-info { flex-grow: 1; overflow: hidden; }
.prod-details { display: flex; gap: 8px; margin-top: 5px; color: #555; font-size: 0.95em; font-weight: bold; }
.badge { background: #eee; padding: 2px 8px; border-radius: 5px; color: var(--d); font-size: 0.85em; }
.prod-img { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
.del-btn { background:#ff4444; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; }
.edit-btn { background:#4caf50; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; margin-right: 5px; }
.view-btn { background:#2196f3; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; margin-right: 5px; }
.aniv-btn { background: #fce4ec; color: #e91e63; border: 1px solid #e91e63; padding: 5px 10px; border-radius: 5px; margin: 2px; cursor: pointer; font-size: 0.9em; }
.filter-btn { background: #31364b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; font-size: 0.9em; }
.filter-btn.active { background: var(--p); }
.alert-box { background: #fff0f0; border-left: 5px solid #ff4444; padding: 10px; margin-top: 10px; color: #d32f2f; font-size: 0.9em; }
</style>
</head>
<body>

<div id='login' class='login'><div class='box'><h2>🌸 ANACHIC</h2><input id='u' placeholder='Usuário'><input id='s' type='password' placeholder='Senha'><button onclick='entrar()'>Entrar 🔑</button></div></div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
    <button onclick="pg('rank')">🏆 Ranking</button>
    <button onclick="pg('bak')">💾 Backup</button>
  </div>

  <div class='main'>
    <div id='dash'><h3>🏠 Dashboard</h3><div class='dashboard-container'><button class='card-dash' onclick="pg('prod')"><span>📦 Produtos</span><b id='cProd'>0</b></button><button class='card-dash' onclick="pg('cli')"><span>👥 Clientes</span><b id='cCli'>0</b></button><button class='card-dash' onclick="pg('rel')"><span>📊 Vendas</span><b id='cVendas'>0</b></button><button class='card-dash' onclick="pg('rel')"><span>💵 Faturamento</span><b id='cFat'>R$0,00</b></button><div class='card-dash' style="grid-column: span 2; cursor: default;"><span>🎂 Aniversariantes do Mês</span><div id='listaAniv' style="font-weight:bold; color:#555; margin-top:5px"></div></div></div><div id='alertaEstoque' class='alert-box' style='display:none'></div></div>

    <div id='prod' class='panel hidden'><h3>📦 Produtos</h3><input id='pn' placeholder='Nome do Produto'><input id='pc' placeholder='Código'><input id='pp' type='number' placeholder='Preço'><input id='pe' type='number' placeholder='Estoque'><input type="file" id="pi" accept="image/*"><button onclick='addProd()'>💾 Salvar Produto</button><div id='listP' style="margin-top:15px"></div></div>

    <div id='cli' class='panel hidden'><h3>👥 Clientes</h3><input id='cn' placeholder='Nome do Cliente'><input id='cw' placeholder='WhatsApp'><input id='ce' placeholder='Endereço'><input id='num' placeholder='Número'><input id='cr' placeholder='Ponto de Referência'><input id='ca' placeholder='Data de Nascimento (dd/mm)' maxlength='5' oninput='mascaraData(this)'><input id='tam' placeholder='Tamanho (ex: P ao G ou 44 ao 52)'><button onclick='addCli()'>💾 Salvar Cliente</button><div id='listC' style="margin-top:15px"></div></div>

    <div id='pdv' class='panel hidden'>
      <h3>🛒 PDV</h3>
      <input id='buscaCli' placeholder='🔍 Buscar Cliente...' oninput='render()'>
      <select id='selCli'></select>
      <input id='buscaProd' placeholder='🔍 Nome ou Código do produto...' oninput='render()'>
      <div style="display:flex; gap:5px;"><input id='scan' placeholder='Código do produto...' onkeypress="if(event.key==='Enter') addCarr()"><button onclick='addCarr()' style="width:100px; margin-top:5px">OK</button></div>
      <div id='carr' style="background:#fff; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd"><div id='carr-items'></div></div>
      <div style="background:#fff; padding:10px; border-radius:10px; margin-bottom:10px;">
        <input type='number' id='pago' placeholder='Valor Pago (R)' step="0.01" oninput='render()'>
        <div id='troco-display' style="margin-top:5px; font-size:1.2em; font-weight:bold; color:green"></div>
      </div>
      <select id='pag'><option>💳 Cartão</option><option>💵 Dinheiro</option><option>📱 PIX</option></select>
      <h3 id='tot'>Total: R$0,00</h3>
      <button onclick='finalizar()'>🖨️ Finalizar Venda e Imprimir</button>
      <button onclick='limparCarrinho()' style="background:#666">Limpar Carrinho</button>
      <hr><h4>Últimas Vendas</h4><div id='pdv-ultimas-vendas'></div>
    </div>

    <div id='rel' class='panel hidden'>
      <h3>📊 Relatórios de Vendas</h3>
      <div style="margin-bottom: 15px;">
        <button class="filter-btn active" id="f-todos" onclick="filtrarRel('todos')">Todos</button>
        <button class="filter-btn" id="f-hoje" onclick="filtrarRel('hoje')">Hoje</button>
        <button class="filter-btn" id="f-semana" onclick="filtrarRel('semana')">Semana</button>
        <button class="filter-btn" id="f-mes" onclick="filtrarRel('mes')">Mês</button>
      </div>
      <div id='listV'></div>
    </div>

    <div id='rank' class='panel hidden'><h3>🏆 Produtos Mais Vendidos</h3><div id='listRank'></div></div>
    <div id='bak' class='panel hidden'><h3>💾 Backup e Restauração</h3><div style="padding:20px; background:#fff; border-radius:10px;"><button onclick="exportarDB()">📥 Fazer Backup (Download)</button><input type="file" id="importDB" onchange="importarDB(event)" style="display:none"><button onclick="document.getElementById('importDB').click()" style="background:#2196f3">📤 Restaurar Backup</button></div></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[]}');
let cart = [];
let relFiltro = 'todos';

function entrar(){ if(u.value.trim().toLowerCase() === 'anachic' && s.value.trim() === '1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } else { alert('Erro'); } }
function pg(i){ ['dash','prod','cli','pdv','rel','rank','bak'].forEach(x=>document.getElementById(x).classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); if(i === 'pdv') document.getElementById('scan').focus(); render(); }
function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }
function mascaraData(input) { let v = input.value.replace(/\D/g, ''); if (v.length > 2) input.value = v.substring(0, 2) + '/' + v.substring(2, 4); else input.value = v; }

function addProd(){ 
    let file = document.getElementById('pi').files[0];
    if(!pn.value) { alert("Preencha o nome do produto!"); return; }
    if(file) {
        let reader = new FileReader();
        reader.onload = function(e) { db.p.push({n:pn.value, c:pc.value, p:parseFloat(pp.value||0), e:pe.value, i:e.target.result}); limparCampos(); save(); };
        reader.readAsDataURL(file);
    } else { db.p.push({n:pn.value, c:pc.value, p:parseFloat(pp.value||0), e:pe.value, i:''}); limparCampos(); save(); }
}
function limparCampos() { pn.value=''; pc.value=''; pp.value=''; pe.value=''; document.getElementById('pi').value=''; }

function ajustarQtd(code, delta) {
    let index = cart.findIndex(item => item.c == code);
    let p = db.p.find(x => x.c == code);
    let qtdNoCarrinho = cart.filter(x => x.c == code).length;
    if (delta > 0) { if (qtdNoCarrinho < parseInt(p.e)) cart.push(p); else alert("Estoque insuficiente!"); }
    else if (index > -1) cart.splice(index, 1);
    render();
}

function verDetalhes(i) { let c = db.c[i]; alert(`CLIENTE: ${c.n}\nWhatsApp: ${c.w}\nEndereço: ${c.e}, Nº ${c.num}\nRef: ${c.r}\nNasc: ${c.a}\nTamanho: ${c.tam || 'Não informado'}`); }
function editarProd(i) {
    let p = db.p[i];
    let novoNome = prompt("Nome:", p.n); let novoPreco = prompt("Preço:", p.p); let novoEstoque = prompt("Estoque:", p.e);
    if (novoNome !== null) { db.p[i].n = novoNome; db.p[i].p = parseFloat(novoPreco); db.p[i].e = novoEstoque; save(); }
}
function verVenda(i) {
    let v = db.v[i];
    let itensStr = v.itens.map(x => `${x.n} (R$${parseFloat(x.p).toFixed(2)})`).join('\n');
    alert(`VENDA:\n${v.data}\nCliente: ${v.cliente}\nPag: ${v.pag}\n\nItens:\n${itensStr}\n\nTotal: R$${parseFloat(v.total).toFixed(2)}`);
}
function addCli(){ if(!cn.value) return; db.c.push({n:cn.value,w:cw.value,e:ce.value,num:num.value,r:cr.value,a:ca.value,tam:tam.value}); cn.value=''; cw.value=''; ce.value=''; num.value=''; cr.value=''; ca.value=''; tam.value=''; save(); }
function del(t, i){ if(confirm('Excluir este item?')) { db[t].splice(i, 1); save(); } }
function delCart(code){ cart = cart.filter(x => x.c != code); render(); }
function limparCarrinho() { if(confirm('Limpar o carrinho?')) { cart=[]; render(); } }

function addCarr(){ 
    let termo = buscaProd.value.trim().toLowerCase();
    let p = db.p.find(x=>x.c == scan.value || x.n.toLowerCase().includes(termo)); 
    let qtdNoCarrinho = cart.filter(x => x.c == p?.c).length;
    if(p && parseInt(p.e) > qtdNoCarrinho){ cart.push(p); scan.value=''; buscaProd.value=''; render(); }
    else { alert("Produto não encontrado ou sem estoque!"); } 
}

function imprimirCupom(v) {
    let w = window.open("", "_blank", "width=300,height=600");
    w.document.write(`<html><head><style>@page { size: 58mm auto; margin: 0; } body { font-family: 'Courier New', monospace; width: 56mm; margin: 0; padding: 5px; font-size: 14px; }</style></head><body><pre>ANACHIC\n--------------------------\nData: ${v.data}\nCliente: ${v.cliente}\n--------------------------\n${v.itens.map(i=>`${i.n} - R$${parseFloat(i.p).toFixed(2)}`).join('\n')}\n--------------------------\nTOTAL: R$${parseFloat(v.total).toFixed(2)}\n\nTroca em até 7 dias úteis\ncom o cupom em mãos.\n--------------------------\n</pre><script>window.print(); window.onafterprint = () => window.close();<\/script></body></html>`);
}

function finalizar(){
    if(cart.length === 0) return;
    cart.forEach(item => { let p = db.p.find(x => x.c == item.c); if(p) p.e = parseInt(p.e) - 1; });
    let total = cart.reduce((a,b)=>a + parseFloat(b.p), 0);
    let novaVenda = {data:new Date().toLocaleString(), total: total, cliente: selCli.value, itens: cart, pag: pag.value};
    db.v.push(novaVenda);
    save();
    imprimirCupom(novaVenda);
    alert("Venda realizada!");
    cart = []; document.getElementById('pago').value = ''; render();
}

function filtrarRel(periodo) {
    relFiltro = periodo;
    ['todos', 'hoje', 'semana', 'mes'].forEach(p => document.getElementById('f-' + p).classList.remove('active'));
    document.getElementById('f-' + periodo).classList.add('active');
    render();
}

function render(){
    if(document.getElementById('cProd')) {
        cProd.innerText = db.p.length; cCli.innerText = db.c.length; cVendas.innerText = db.v.length;
        cFat.innerText = 'R$' + db.v.reduce((a,b)=>a+b.total, 0).toFixed(2);
        let mesAtual = (new Date().getMonth()+1).toString().padStart(2,'0');
        listaAniv.innerHTML = db.c.filter(c=>c.a?.split('/')[1]===mesAtual).map((c,i)=>`<button class='aniv-btn' onclick='verDetalhes(db.c.findIndex(x=>x.n=="${c.n}"))'>${c.n}</button>`).join('') || "Nenhum este mês";
        let baixos = db.p.filter(p => parseInt(p.e) <= 3);
        alertaEstoque.style.display = baixos.length > 0 ? 'block' : 'none';
        alertaEstoque.innerHTML = '⚠️ <b>Atenção:</b> Itens com pouco estoque: ' + baixos.map(p => p.n).join(', ');
    }
    
    // Filtro de Clientes e Produtos no PDV
    if(document.getElementById('selCli')) {
        let termoC = buscaCli.value.toLowerCase();
        let clientes = db.c.filter(c => c.n.toLowerCase().includes(termoC));
        selCli.innerHTML = '<option>Cliente Avulso</option>' + clientes.map(c=>`<option>${c.n}</option>`).join('');
        
        let total = cart.reduce((a,b)=>a + parseFloat(b.p), 0);
        let valorPago = parseFloat(document.getElementById('pago').value||0);
        document.getElementById('troco-display').innerText = valorPago > total ? "Troco: R$ " + (valorPago - total).toFixed(2).replace('.',',') : "";
        let grouped = cart.reduce((acc, curr) => { acc[curr.c] = acc[curr.c] || { ...curr, count: 0 }; acc[curr.c].count++; return acc; }, {});
        document.getElementById('carr-items').innerHTML = Object.values(grouped).map(i=>`<div class='list-item'>${i.n} <div style="display:flex; align-items:center; gap:5px;"><button onclick='ajustarQtd("${i.c}", -1)' style="width:25px; height:25px; padding:0">-</button><span>${i.count}</span><button onclick='ajustarQtd("${i.c}", 1)' style="width:25px; height:25px; padding:0">+</button></div> <b>R$${(parseFloat(i.p)*i.count).toFixed(2)}</b><button class='del-btn' onclick='delCart("${i.c}")'>🗑️</button></div>`).join('');
        document.getElementById('tot').innerText = 'Total: R$'+total.toFixed(2);
        document.getElementById('pdv-ultimas-vendas').innerHTML = db.v.map((v, idx) => ({v, idx})).slice(-5).reverse().map(item => `<div class='list-item'><div>${item.v.cliente} <b>R$${item.v.total.toFixed(2)}</b></div><button class='view-btn' style='background:#4caf50;' onclick='imprimirCupom(db.v[${item.idx}])'>🖨️</button></div>`).join('');
    }

    if(document.getElementById('listP')) listP.innerHTML = db.p.map((p,i)=>`<div class='list-item'>${p.i?`<img src='${p.i}' class='prod-img'>`:''} <div class='prod-info'><strong>${p.n}</strong><div class='prod-details'><span class='badge'>Cód: ${p.c}</span><span class='badge'>Est: ${p.e}</span><span style="color:var(--p)">R$ ${parseFloat(p.p).toFixed(2)}</span></div></div> <button class='edit-btn' onclick='editarProd(${i})'>✏️</button><button class='del-btn' onclick='del("p",${i})'>🗑️</button></div>`).join('');
    if(document.getElementById('listC')) listC.innerHTML = db.c.map((c,i)=>`<div class='list-item' onclick='verDetalhes(${i})'><div class='prod-info'>${c.n}</div><button class='del-btn' onclick='event.stopPropagation(); del("c",${i})'>🗑️</button></div>`).join('');
    if(document.getElementById('listV')) {
        let agora = new Date();
        let filtradas = db.v.map((v, idx) => ({v, idx})).filter(item => {
            let dataStr = item.v.data.split(',')[0];
            let [d, m, a] = dataStr.split('/').map(Number);
            let dataV = new Date(a, m - 1, d);
            if (relFiltro === 'todos') return true;
            if (relFiltro === 'hoje') return dataV.toDateString() === agora.toDateString();
            if (relFiltro === 'semana') {
                let temp = new Date(agora);
                let inicioSemana = new Date(temp.setDate(temp.getDate() - temp.getDay()));
                inicioSemana.setHours(0,0,0,0);
                return dataV >= inicioSemana;
            }
            if (relFiltro === 'mes') return (m === (agora.getMonth() + 1)) && (a === agora.getFullYear());
            return true;
        });
        listV.innerHTML = filtradas.map(item => `<div class='list-item'><div onclick='verVenda(${item.idx})' style="flex-grow:1"><strong>${item.v.data.split(',')[0]}</strong> - ${item.v.cliente}<br><small>Total: R$${parseFloat(item.v.total).toFixed(2)} (${item.v.pag})</small></div><button class='view-btn' style='background:#4caf50;' onclick='imprimirCupom(db.v[${item.idx}])'>🖨️ Reimp.</button><button class='view-btn' onclick='verVenda(${item.idx})'>👁️</button><button class='del-btn' onclick='del("v",${item.idx})'>🗑️</button></div>`).join('');
    }
    if(document.getElementById('listRank')) {
        let contagem = {};
        db.v.forEach(v => v.itens.forEach(item => contagem[item.n] = (contagem[item.n] || 0) + 1));
        listRank.innerHTML = Object.entries(contagem).sort((a,b) => b[1] - a[1]).map(p => `<div class='list-item'>${p[0]} <b>${p[1]} vendidos</b></div>`).join('');
    }
}
function exportarDB() { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([localStorage.getItem('db')])); a.download="backup.json"; a.click(); }
function importarDB(event) { let r = new FileReader(); r.onload = (e) => { localStorage.setItem('db', e.target.result); db = JSON.parse(e.target.result); render(); }; r.readAsText(event.target.files[0]); }
render();
</script>
</body>
</html>
