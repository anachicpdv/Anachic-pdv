<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}
.dashboard-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; border: none; cursor: pointer; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.card-dash span { font-size: 0.8em; color: #555; }
.card-dash b { display:block; font-size:1.2em; color:var(--p); margin-top: 5px; }
.list-item { background:#fff; padding:12px; margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; gap:10px; cursor:pointer; }
.prod-info { flex-grow: 1; overflow: hidden; }
.prod-details { display:flex; gap:8px; margin-top:5px; color:#555; font-size:0.95em; font-weight:bold; }
.badge { background:#eee; padding:2px 8px; border-radius:5px; color:var(--d); font-size:0.85em; }
.prod-img { width:45px; height:45px; object-fit:cover; border-radius:5px; flex-shrink:0; }
.del-btn { background:#ff4444; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border:none; cursor:pointer; flex-shrink:0; width:auto; }
.edit-btn { background:#4caf50; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border:none; cursor:pointer; flex-shrink:0; width:auto; margin-right:5px; }
.view-btn { background:#2196f3; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border:none; cursor:pointer; flex-shrink:0; width:auto; margin-right:5px; }
.aniv-btn { background:#fce4ec; color:#e91e63; border:1px solid #e91e63; padding:5px 10px; border-radius:5px; margin:2px; cursor:pointer; font-size:0.9em; }

/* 🆕 Melhorias para mensagens e relatórios */
.filter-btn { background:#31364b; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; margin-right:10px; font-size:1em; font-weight:500; transition: all 0.2s ease; }
.filter-btn.active { background:var(--p); box-shadow: 0 2px 8px rgba(233,30,99,0.25); transform: translateY(-1px); }
.filter-btn:hover:not(.active) { background:#3b4158; }
.filtros-container { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:25px; }
.alert-box { background:#fff0f0; border-left:5px solid #ff4444; padding:12px; margin-top:10px; border-radius:4px; color:#d32f2f; font-size:0.9em; }
.btn-verde { background: #2e7d32; }
.btn-vermelho { background: #d32f2f; }

/* 🆕 Notificação profissional elegante */
.mensagem-flutuante {
    position: fixed;
    top: 25px;
    right: 25px;
    z-index: 99999;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
    border-left: 5px solid;
    padding: 18px 24px;
    min-width: 320px;
    max-width: 400px;
    animation: deslizarEntrada 0.35s ease-out;
}
@keyframes deslizarEntrada {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
}
.mensagem-sucesso { border-left-color: #2e7d32; }
.mensagem-erro { border-left-color: #d32f2f; }
.mensagem-flutuante h5 { margin:0 0 8px 0; font-size:16px; }
.mensagem-flutuante p { margin:0; font-size:14px; line-height:1.5; color:#444; }
.mensagem-sucesso h5 { color:#2e7d32; }
.mensagem-erro h5 { color:#d32f2f; }

/* 🆕 Estilo para alerta de confirmação mais claro */
.alerta-confirmacao {
    border: none;
    border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.2); padding: 0; overflow: hidden; font-family: inherit;
}
</style>
</head>
<body>

<div id='login' class='login'><div class='box'><h2>🌸 ANACHIC</h2><input id='u' placeholder='Usuário'><input id='s' type='password' placeholder='Senha'><button onclick='entrar()'>Entrar 🔑</button></div></div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('caixa')">💵 Caixa</button>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
    <button onclick="pg('rank')">🏆 Ranking</button>
    <button onclick="pg('bak')">💾 Backup</button>
  </div>

  <div class='main'>
    <div id='dash' class='panel hidden'><h3>🏠 Dashboard</h3><div class='dashboard-container'><button class='card-dash' onclick="pg('prod')"><span>📦 Produtos</span><b id='cProd'>0</b></button><button class='card-dash' onclick="pg('cli')"><span>👥 Clientes</span><b id='cCli'>0</b></button><button class='card-dash' onclick="pg('rel')"><span>📊 Vendas</span><b id='cVendas'>0</b></button><button class='card-dash' onclick="pg('rel')"><span>💵 Faturamento</span><b id='cFat'>R$0,00</b></button><div class='card-dash' style="grid-column: span 2; cursor: default;"><span>🎂 Aniversariantes do Mês</span><div id='listaAniv' style="font-weight:bold; color:#555; margin-top:5px"></div></div></div><div id='alertaEstoque' class='alert-box' style='display:none'></div></div>

    <div id='prod' class='panel hidden'>
        <h3>📦 Produtos</h3>
        <input id='buscaProdGeral' placeholder='🔍 Buscar produto por nome ou código...' oninput='render()'>
        <input id='pn' placeholder='Nome do Produto'><input id='pc' placeholder='Código'><input id='pp' type='number' placeholder='Preço'><input id='pe' type='number' placeholder='Estoque' min="0"><input type="file" id="pi" accept="image/*"><button onclick='addProd()'>💾 Salvar Produto</button>
        <div id='listP' style="margin-top:15px"></div>
    </div>

    <div id='cli' class='panel hidden'><h3>👥 Clientes</h3><input id='cn' placeholder='Nome do Cliente'><input id='cw' placeholder='WhatsApp'><input id='ce' placeholder='Endereço'><input id='num' placeholder='Número'><input id='cr' placeholder='Bairro'><input id='ca' placeholder='Data de Nascimento (dd/mm)' maxlength='5' oninput='mascaraData(this)'><input id='tam' placeholder='Tamanho'><button onclick='addCli()'>💾 Salvar Cliente</button><div id='listC' style="margin-top:15px"></div></div>

    <div id='caixa' class='panel'>
        <h3>💵 Controle de Caixa</h3>
        <div id='statusCaixa' style="padding:15px; background:#fff; border-radius:10px; margin-bottom:10px; font-weight:bold;"></div>
        <div id='blocoAbertura'>
            <input type='number' id='valInicial' placeholder='Valor Inicial em Caixa (R$)' step='0.01'>
            <button onclick='abrirCaixa()'>✅ Abrir Caixa</button>
        </div>
        <div id='blocoFechamento' class='hidden'>
            <button class="btn-verde" onclick='gerarRelatorioPDF()'>📄 Baixar Relatório (PDF)</button>
            <button class="btn-vermelho" onclick='fecharCaixa()'>🔒 Fechar Caixa</button>
        </div>
    </div>

    <div id='pdv' class='panel hidden'>
      <h3>🛒 PDV</h3>
      <input id='buscaCli' placeholder='🔍 Buscar Cliente...' oninput='render()'>
      <select id='selCli'></select>
      <div style="display:flex; gap:5px;"><input id='scan' placeholder='Código do produto...' onkeypress="if(event.key==='Enter') addCarr()"><button onclick='addCarr()' style="width:100px; margin-top:5px">OK</button></div>
      <div id='carr' style="background:#fff; padding:10px; margin:10px 0; border-radius:10px; border:1px solid #ddd"><div id='carr-items'></div></div>
      <div style="background:#fff; padding:10px; border-radius:10px; margin-bottom:10px;">
        <input type='number' id='pago' placeholder='Valor Pago (R$)' step="0.01" oninput='render()'>
        <div id='troco-display' style="margin-top:5px; font-size:1.2em; font-weight:bold; color:green"></div>
      </div>
      <select id='pag'><option>💳 Cartão</option><option>💵 Dinheiro</option><option>📱 PIX</option></select>
      <h3 id='tot'>Total: R$0,00</h3>
      <button onclick='finalizar()'>🖨️ Finalizar Venda e Imprimir</button>
      <button onclick='limparCarrinho()' style="background:#666">Limpar Carrinho</button>
      <hr><h4>Últimas Vendas</h4><div id='pdv-ultimas-vendas'></div>
    </div>

    <div id='rel' class='panel hidden'>
      <h3>📊 Relatórios de Vendas</h3>
      <div class="filtros-container">
        <button class="filter-btn active" id="f-todos" onclick="filtrarRel('todos')">📋 Todos</button>
        <button class="filter-btn" id="f-hoje" onclick="filtrarRel('hoje')">📅 Hoje</button>
        <button class="filter-btn" id="f-semana" onclick="filtrarRel('semana')">📆 Semana</button>
        <button class="filter-btn" id="f-mes" onclick="filtrarRel('mes')">🗓️ Mês</button>
      </div>
      <div id='listV'></div>
    </div>

    <div id='rank' class='panel hidden'><h3>🏆 Produtos Mais Vendidos</h3><div id='listRank'></div></div>
    <div id='bak' class='panel hidden'><h3>💾 Backup e Restauração</h3><div style="padding:20px; background:#fff; border-radius:10px;"><button onclick="exportarDB()">📥 Fazer Backup (Download)</button><input type="file" id="importDB" onchange="importarDB(event)" style="display:none"><button onclick="document.getElementById('importDB').click()" style="background:#2196f3">📤 Restaurar Backup</button></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script>
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[],"caixa":{"aberto":false,"valor":0,"inicio":""}}');
let cart = [];
let relFiltro = 'todos';

// 🆕 Sistema de mensagens profissionais
function mostrarMensagem(titulo, texto, tipo = 'sucesso'){
    const div = document.createElement('div');
    div.className = `mensagem-flutuante mensagem-${tipo}`;
    div.innerHTML = `<h5>${titulo}</h5><p>${texto}</p>`;
    document.body.appendChild(div);
    setTimeout(()=>{ div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 4200);
}

function entrar(){ 
    if(u.value.trim().toLowerCase() === 'anachic' && s.value.trim() === '1234'){ 
        login.classList.add('hidden'); 
        app.classList.remove('hidden'); 
        pg('caixa'); 
        render(); 
    } else { 
        mostrarMensagem('❌ Acesso Negado', 'Usuário ou senha incorretos!', 'erro'); 
    } 
}

function pg(i){ 
    ['dash','prod','cli','caixa','pdv','rel','rank','bak'].forEach(x=>document.getElementById(x).classList.add('hidden')); 
    document.getElementById(i).classList.remove('hidden'); 
    if(i === 'pdv') document.getElementById('scan').focus(); 
    render(); 
}

function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }
function mascaraData(input) { let v = input.value.replace(/\D/g, ''); if (v.length > 2) input.value = v.substring(0, 2) + '/' + v.substring(2, 4); else input.value = v; }

function abrirCaixa(){
    let v = parseFloat(valInicial.value || 0);
    db.caixa = {aberto: true, valor: v, inicio: new Date().toLocaleString('pt-BR'), timestamp: new Date().getTime()};
    save(); 
    mostrarMensagem(
        '✅ Caixa Aberto com Sucesso',
        `Período iniciado em: ${db.caixa.inicio}<br>Valor inicial registrado: R$ ${v.toFixed(2)}`
    );
}

function gerarRelatorioPDF(){
    if(!db.caixa.aberto) { mostrarMensagem('⚠️ Atenção', 'Abra o caixa primeiro para gerar o relatório!', 'erro'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const margem = 15;
    let y = 15;

    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(233, 30, 99);
    doc.text('ANACHIC PRO', margem, y);
    y += 7;
    doc.setFontSize(14);
    doc.setTextColor(0,0,0);
    doc.text('RELATÓRIO DE FECHAMENTO DE CAIXA', margem, y);
    y += 10;

    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.text(`Data de Abertura: ${db.caixa.inicio}`, margem, y); y += 6;
    doc.text(`Valor Inicial: R$ ${db.caixa.valor.toFixed(2)}`, margem, y); y += 8;

    let vendasDoPeriodo = db.v.filter(v => new Date(v.dataCompleta || v.data).getTime() > db.caixa.timestamp);
    let totalVendas = vendasDoPeriodo.reduce((a,b)=>a+b.total, 0);
    let totalGeral = db.caixa.valor + totalVendas;

    doc.autoTable({
        startY: y,
        head: [['DESCRIÇÃO', 'VALOR (R$)']],
        body: [
            ['Saldo Inicial', db.caixa.valor.toFixed(2)],
            ['Total de Vendas', totalVendas.toFixed(2)],
            ['TOTAL EM CAIXA', totalGeral.toFixed(2)]
        ],
        theme: 'grid',
        headStyles: { fillColor: [233, 30, 99], textColor: 255 },
        footStyles: { fillColor: [220, 220, 220], fontStyle: 'bold' },
        margin: { left: margem, right: margem }
    });
    y = doc.lastAutoTable.finalY + 10;

    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text('PRODUTOS VENDIDOS NO PERÍODO', margem, y);
    y += 6;

    let produtosVendidos = {};
    vendasDoPeriodo.forEach(v => {
        v.itens.forEach(i => {
            if(!produtosVendidos[i.n]) produtosVendidos[i.n] = { qtd: 0, valor: 0 };
            produtosVendidos[i.n].qtd += 1;
            produtosVendidos[i.n].valor += parseFloat(i.p);
        });
    });

    if(Object.keys(produtosVendidos).length === 0){
        doc.setFontSize(11);
        doc.setFont('helvetica', 'italic');
        doc.text('Nenhuma venda realizada neste período.', margem, y);
    } else {
        const dadosTabela = Object.entries(produtosVendidos).map(([nome, dados]) => [
            nome,
            dados.qtd,
            `R$ ${dados.valor.toFixed(2)}`
        ]);

        doc.autoTable({
            startY: y,
            head: [['Produto', 'Quantidade', 'Valor Total']],
            body: dadosTabela,
            theme: 'grid',
            headStyles: { fillColor: [32, 36, 51], textColor: 255 },
            margin: { left: margem, right: margem },
            styles: { fontSize: 9 }
        });
    }

    doc.setFontSize(8);
    doc.setTextColor(100,100,100);
    doc.text(`Relatório gerado em: ${new Date().toLocaleString('pt-BR')}`, margem, 290);

    doc.save(`Relatorio_Caixa_${new Date().toISOString().slice(0,10)}.pdf`);
}

function fecharCaixa(){
    const confirmacao = confirm(`⚠️ FECHAMENTO DE CAIXA

✅ Confirme SOMENTE após salvar o relatório em PDF!

• Período atual será FINALIZADO
• Valores não poderão ser alterados depois
• Você pode abrir um novo caixa a qualquer momento

Deseja realmente fechar o caixa agora?`);
    
    if(!confirmacao) return;
    
    db.caixa = {aberto: false, valor: 0, inicio: ""};
    save();
    mostrarMensagem('🔒 Caixa Fechado', 'Período encerrado com sucesso!');
}

function addProd(){ 
    let file = document.getElementById('pi').files[0];
    if(!pn.value.trim()) { mostrarMensagem('⚠️ Atenção', 'Preencha o nome do produto!', 'erro'); return; }
    const codigo = pc.value.trim();
    if(db.p.some(p => p.c === codigo)) { mostrarMensagem('⚠️ Código duplicado', 'Já existe um produto com esse código!', 'erro'); return; }
    if(file) {
        let reader = new FileReader();
        reader.onload = function(e) { 
            db.p.push({n:pn.value.trim(), c:codigo, p:parseFloat(pp.value||0), e:Math.max(0,parseInt(pe.value||0)), i:e.target.result}); 
            limparCampos(); 
            save(); 
            mostrarMensagem('✅ Produto Cadastrado', 'Produto salvo com sucesso!');
        };
        reader.readAsDataURL(file);
    } else { 
        db.p.push({n:pn.value.trim(), c:codigo, p:parseFloat(pp.value||0), e:Math.max(0,parseInt(pe.value||0)), i:''}); 
        limparCampos(); 
        save(); 
        mostrarMensagem('✅ Produto Cadastrado', 'Produto salvo com sucesso!');
    }
}
function limparCampos() { pn.value=''; pc.value=''; pp.value=''; pe.value=''; document.getElementById('pi').value=''; }

// ✅ CORRIGIDO: Controle de estoque - nunca fica negativo
function ajustarQtd(code, delta) {
    let p = db.p.find(x => x.c == code);
    if(!p) return;
    const estoqueAtual = parseInt(p.e) || 0;
    let qtdNoCarrinho = cart.filter(x => x.c == code).length;
    
    if (delta > 0) { 
        if (estoqueAtual > qtdNoCarrinho) {
            cart.push(p); 
        } else {
            mostrarMensagem('⚠️ Estoque', `Disponível: ${estoqueAtual} | Já no carrinho: ${qtdNoCarrinho}`, 'erro'); 
        }
    } else { 
        let idx = cart.findIndex(x => x.c == code);
        if(idx > -1) cart.splice(idx, 1); 
    }
    render();
}

function verDetalhes(i) { 
    let c = db.c[i]; 
    alert(`👤 CLIENTE\nNome: ${c.n}\nWhatsApp: ${c.w||'Não informado'}\nEndereço: ${c.e||''}, Nº ${c.num||''}\nBairro: ${c.r||''}\nNascimento: ${c.a||'Não informado'}\nTamanho: ${c.tam||'Não informado'}`); 
}

function editarProd(i) {
    let p = db.p[i];
    let novoNome = prompt("Nome do Produto:", p.n);
    if(novoNome === null) return;
    let novoPreco = prompt("Preço de Venda:", p.p);
    let novoEstoque = prompt("Quantidade em Estoque:", p.e);
    if(novoNome && novoPreco && novoEstoque){
        db.p[i].n = novoNome.trim();
        db.p[i].p = parseFloat(novoPreco);
        db.p[i].e = Math.max(0, parseInt(novoEstoque));
        save();
        mostrarMensagem('✅ Atualizado', 'Dados do produto alterados com sucesso!');
    }
}

function verVenda(i) {
    let v = db.v[i];
    let itensStr = v.itens.map(x => `• ${x.n} - R$ ${parseFloat(x.p).toFixed(2)}`).join('\n');
    alert(`🧾 VENDA\nData: ${v.dataCompleta || v.data}\nCliente: ${v.cliente}\nPagamento: ${v.pag}\n\nItens:\n${itensStr}\n\nTotal: R$ ${parseFloat(v.total).toFixed(2)}`);
}

function addCli(){ 
    const nome = cn.value.trim();
    if(!nome) { mostrarMensagem('⚠️ Atenção', 'Nome do cliente é obrigatório!', 'erro'); return; }
    if(db.c.some(cli => cli.n === nome)) { mostrarMensagem('⚠️ Cliente existente', 'Já existe um cliente com esse nome!', 'erro'); return; }
    db.c.push({
        n: nome,
        w: cw.value.trim(),
        e: ce.value.trim(),
        num: num.value.trim(),
        r: cr.value.trim(),
        a: ca.value.trim(),
        tam: tam.value.trim()
    });
    cn.value=''; cw.value=''; ce.value=''; num.value=''; cr.value=''; ca.value=''; tam.value=''; 
    save(); 
    mostrarMensagem('✅ Cliente Cadastrado', 'Registro salvo com sucesso!');
}

function del(t, i){ if(confirm('Tem certeza que deseja excluir? Esta ação não pode ser desfeita!')) { db[t].splice(i, 1); save(); } }
function delCart(code){ cart = cart.filter(x => x.c != code); render(); }
function limparCarrinho() { if(confirm('Limpar todos os itens do carrinho?')) { cart=[]; render(); } }

// ✅ CORRIGIDO: Adicionar produto com verificação correta
function addCarr(){ 
    let cod = scan.value.trim();
    if(!cod) return;
    let p = db.p.find(x=>x.c == cod); 
    if(!p) { mostrarMensagem('❌ Não encontrado', 'Produto não cadastrado!', 'erro'); scan.value=''; return; }
    const estoqueAtual = parseInt(p.e) || 0;
    let qtdNoCarrinho = cart.filter(x => x.c == cod).length;
    
    if(estoqueAtual <= 0){
        mostrarMensagem('⚠️ Estoque ZERO', 'Produto sem estoque disponível!', 'erro');
        scan.value='';
        return;
    }
    if(estoqueAtual > qtdNoCarrinho){ 
        cart.push(p); 
        scan.value=''; 
        render(); 
    } else { 
        mostrarMensagem('⚠️ Estoque insuficiente', `Máximo disponível: ${estoqueAtual}`, 'erro'); 
        scan.value='';
    } 
}

// ✅ IMPRESSÃO TERMICA 58mm - ATUALIZADA
function imprimirCupom(v) {
    if(typeof v === 'number') v = db.v[v];
    if(!v) return;

    const itensAgrupados = {};
    v.itens.forEach(item => {
        if(!itensAgrupados[item.n]) itensAgrupados[item.n] = { qtd: 0, preco: parseFloat(item.p) };
        itensAgrupados[item.n].qtd++;
    });

    const janela = window.open("", "_blank", "width=320,height=600,scrollbars=no");

function finalizar(){
    if(!db.caixa.aberto) { mostrarMensagem('⚠️ Caixa fechado', 'Abra o caixa antes de realizar vendas!', 'erro'); return; }
    if(cart.length === 0) { mostrarMensagem('🛒 Carrinho vazio', 'Adicione produtos para finalizar!', 'erro'); return; }

    // ✅ Definição que faltava: dadosCliente
    const nomeCliente = selCli.value || "Consumidor Final";
    const dadosCliente = db.c.find(c => c.n === nomeCliente);

    // ✅ Verificação segura de estoque
    let estoqueValido = true;
    cart.forEach(item => {
        const p = db.p.find(x => x.c == item.c);
        const qtd = cart.filter(x => x.c == item.c).length;
        if (!p || parseInt(p.e) < qtd) estoqueValido = false;
    });

    if(!estoqueValido){
        mostrarMensagem('❌ IMPOSSÍVEL FINALIZAR', 'Um ou mais produtos estão sem estoque suficiente!', 'erro');
        return;
    }

    // ✅ Só reduz o estoque se tudo estiver certo
    cart.forEach(item => { let p = db.p.find(x => x.c == item.c); if(p) p.e = parseInt(p.e) - 1; });
    
    let total = cart.reduce((a,b)=>a + parseFloat(b.p), 0);
    let valorPago = parseFloat(document.getElementById('pago').value || 0);
    let troco = Math.max(0, valorPago - total);

    let novaVenda = {
        data: new Date().toLocaleDateString('pt-BR'), 
        dataCompleta: new Date().toLocaleString('pt-BR'), 
        timestamp: new Date().getTime(),
        total: total, 
        pago: valorPago,
        troco: troco,
        cliente: nomeCliente, 
        endereco: dadosCliente ? `${dadosCliente.e || ''}, Nº ${dadosCliente.num || ''}` : "", 
        bairro: dadosCliente ? dadosCliente.r || "" : "",
        itens: [...cart], 
        pag: pag.value
    };

    db.v.push(novaVenda);
    save();
    imprimirCupom(novaVenda);
    mostrarMensagem('✅ Venda Concluída', `Total: R$ ${total.toFixed(2)} registrada com sucesso!`);
    
    cart = []; 
    document.getElementById('pago').value = ''; 
    render();
}

function filtrarRel(periodo) {
    relFiltro = periodo;
    ['todos', 'hoje', 'semana', 'mes'].forEach(p => {
        const btn = document.getElementById('f-' + p);
        if(btn) btn.classList.remove('active');
    });
    const btnAtivo = document.getElementById('f-' + periodo);
    if(btnAtivo) btnAtivo.classList.add('active');
    render();
}

function exportarDB(){
    const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `anachic-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    mostrarMensagem('✅ Backup Gerado', 'Arquivo salvo com sucesso no seu computador!');
}

function importarDB(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
        try {
            const restaurado = JSON.parse(ev.target.result);
            db = restaurado;
            save();
            mostrarMensagem('✅ Backup Restaurado', 'Todos os dados foram recuperados com sucesso!');
        } catch(err) {
            mostrarMensagem('❌ Falha', 'Arquivo de backup inválido ou corrompido!', 'erro');
        }
    };
    reader.readAsText(file);
}

// ✅ CORRIGIDO: Relatórios funcionando com data brasileira
function render(){
    statusCaixa.innerHTML = db.caixa.aberto ? `✅ Status: ABERTO (Início: ${db.caixa.inicio})` : `🔒 Status: FECHADO`;
    blocoAbertura.classList.toggle('hidden', db.caixa.aberto);
    blocoFechamento.classList.toggle('hidden', !db.caixa.aberto);

    cProd.innerText = db.p.length; 
    cCli.innerText = db.c.length; 
    cVendas.innerText = db.v.length;
    cFat.innerText = 'R$ ' + db.v.reduce((a,b)=>a + (parseFloat(b.total)||0), 0).toFixed(2);
    
    let mesAtual = (new Date().getMonth()+1).toString().padStart(2,'0');
    if(listaAniv) {
        listaAniv.innerHTML = db.c
            .filter(c => c.a && c.a.split('/')[1] === mesAtual)
            .map((c,i) => `<button class='aniv-btn' onclick='verDetalhes(${db.c.findIndex(x=>x.n===c.n)})'>${c.n}</button>`)
            .join('') || "Nenhum este mês";
    }
    
    if(document.getElementById('selCli')) {
        let sel = document.getElementById('selCli');
        let valAtual = sel.value;
        sel.innerHTML = '<option value="">Cliente Avulso</option>' + db.c.map(c=>`<option value="${c.n}">${c.n}</option>`).join('');
        if ([...sel.options].some(o => o.value === valAtual)) sel.value = valAtual;
        
        let total = cart.reduce((a,b)=>a + (parseFloat(b.p)||0), 0);
        let valorPago = parseFloat(document.getElementById('pago').value||0);
        document.getElementById('troco-display').innerText = valorPago >= total ? `Troco: R$ ${(valorPago - total).toFixed(2)}` : "";
        
        let grouped = cart.reduce((acc, curr) => { acc[curr.c] = acc[curr.c] || { ...curr, count: 0 }; acc[curr.c].count++; return acc; }, {});
        document.getElementById('carr-items').innerHTML = Object.values(grouped).map(i=>`<div class='list-item'>
            <span>${i.n}</span>
            <div style="display:flex;align-items:center;gap:5px;">
                <button onclick='ajustarQtd("${i.c}", -1)' style="width:25px;height:25px;padding:0">-</button>
                <span>${i.count}</span>
                <button onclick='ajustarQtd("${i.c}", 1)' style="width:25px;height:25px;padding:0">+</button>
            </div>
            <b>R$ ${(parseFloat(i.p)*i.count).toFixed(2)}</b>
            <button class='del-btn' onclick='delCart("${i.c}")'>🗑️</button>
        </div>`).join('');
        
        document.getElementById('tot').innerText = 'Total: R$ ' + total.toFixed(2);
        document.getElementById('pdv-ultimas-vendas').innerHTML = db.v.slice(-5).reverse().map((v, i) => `<div class='list-item'>
            <span>${v.cliente} - ${v.dataCompleta || v.data}<br>Total: R$ ${parseFloat(v.total||0).toFixed(2)}</span>
            <button class='view-btn' onclick='imprimirCupom(${db.v.length - 1 - i})'>🖨️ Reimprimir</button>
        </div>`).join('');
    }

    if(document.getElementById('listP')) {
        let termo = buscaProdGeral.value.toLowerCase().trim();
        let filtrados = db.p.filter(p => p.n.toLowerCase().includes(termo) || p.c.toLowerCase().includes(termo));
        listP.innerHTML = filtrados.length ? filtrados.map((p,i)=>`<div class='list-item'>
            ${p.i ? `<img src='${p.i}' class='prod-img'>` : ''}
            <div class='prod-info'>
                <strong>${p.n}</strong>
                <div class='prod-details'>
                    <span class='badge'>Cód: ${p.c}</span>
                    <span class='badge'>Est: ${parseInt(p.e) || 0}</span>
                    <span style="color:var(--p);font-weight:bold;">R$ ${parseFloat(p.p||0).toFixed(2)}</span>
                </div>
            </div>
            <button class='edit-btn' onclick='editarProd(${i})'>✏️ Editar</button>
            <button class='del-btn' onclick='del("p",${i})'>🗑️ Excluir</button>
        </div>`).join('') : `<p style="text-align:center; padding:20px; color:#777;">Nenhum produto cadastrado</p>`;
    }

    if(document.getElementById('listC')) {
        listC.innerHTML = db.c.length ? db.c.map((c,i)=>`<div class='list-item' onclick='verDetalhes(${i})'>
            <div class='prod-info'><strong>${c.n}</strong><br><small>${c.w || 'Sem telefone'}</small></div>
            <button class='del-btn' onclick='event.stopPropagation(); del("c",${i})'>🗑️ Excluir</button>
        </div>`).join('') : `<p style="text-align:center; padding:20px; color:#777;">Nenhum cliente cadastrado</p>`;
    }

    // ✅ RELATÓRIOS CORRIGIDOS: Filtros funcionam com data BR
    if(document.getElementById('listV')) {
        const agora = new Date();
        let filtradas = db.v.map((v, idx) => ({v, idx}));

        if (relFiltro !== 'todos') {
            filtradas = filtradas.filter(item => {
                if (!item.v.dataCompleta) return false;
                const dataStr = item.v.dataCompleta.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1');
                const dataV = new Date(dataStr);
                if(isNaN(dataV.getTime())) return false;

                if (relFiltro === 'hoje') return dataV.toDateString() === agora.toDateString();
                if (relFiltro === 'semana') {
                    const inicioSemana = new Date(agora);
                    inicioSemana.setDate(agora.getDate() - agora.getDay());
                    inicioSemana.setHours(0,0,0,0);
                    return dataV >= inicioSemana;
                }
                if (relFiltro === 'mes') return dataV.getMonth() === agora.getMonth() && dataV.getFullYear() === agora.getFullYear();
                return true;
            });
        }

        listV.innerHTML = filtradas.length ? filtradas.map(item => `<div class='list-item'>
            <div onclick='verVenda(${item.idx})' style="flex-grow:1;">
                <strong>${item.v.dataCompleta}</strong><br>
                Cliente: ${item.v.cliente}<br>
                Total: R$ ${parseFloat(item.v.total||0).toFixed(2)} | ${item.v.pag}
            </div>
            <button class='view-btn' onclick='imprimirCupom(${item.idx})'>🖨️ Reimprimir</button>
            <button class='view-btn' onclick='verVenda(${item.idx})'>👁️ Ver</button>
            <button class='del-btn' onclick='del("v",${item.idx})'>🗑️ Excluir</button>
        </div>`).join('') : `<p style="text-align:center; padding:30px; color:#777; font-size:15px;">Nenhuma venda registrada no período selecionado</p>`;
    }

    if(document.getElementById('listRank')) {
        let maisVendidos = {};
        db.v.forEach(v => {
            v.itens.forEach(i => {
                maisVendidos[i.n] = (maisVendidos[i.n] || 0) + 1;
            });
        });
        const ordenados = Object.entries(maisVendidos).sort((a,b)=>b[1]-a[1]);
        listRank.innerHTML = ordenados.length ? ordenados.map(([nome, qtd], i)=>`<div class='list-item'><span>${i+1}º ${nome}</span><b>${qtd} unid.</b></div>`).join('') : `<p style="text-align:center; padding:20px; color:#777;">Nenhuma venda realizada</p>`;
    }
}

render();
</script>
