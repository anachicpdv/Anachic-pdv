<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}
.dashboard-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; border: none; cursor: pointer; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.card-dash span { font-size: 0.8em; color: #555; }
.card-dash b { display:block; font-size:1.2em; color:var(--p); margin-top: 5px; }
.list-item { background:#fff; padding:12px; margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; gap:10px; }
.del-btn { background:#ff4444; color:white; padding:8px; border-radius:5px; border: none; cursor: pointer; }
</style>
</head>
<body>

<div id='login' class='login'>
  <div class='box'>
    <h2>🌸 ANACHIC</h2>
    <input id='u' placeholder='Usuário'>
    <input id='s' type='password' placeholder='Senha'>
    <button onclick='entrar()'>Entrar 🔑</button>
  </div>
</div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
  </div>

  <div class='main'>
    <div id='dash'>
      <h3>🏠 Dashboard</h3>
      <div class='dashboard-container'>
        <button class='card-dash' onclick="pg('prod')"><span>Produtos</span><b id='cProd'>0</b></button>
        <button class='card-dash' onclick="pg('cli')"><span>Clientes</span><b id='cCli'>0</b></button>
        <div class='card-dash' style="grid-column: span 2;"><span>⚠️ Reposição (Estoque ≤ 2)</span><div id='listaRepor' style="color:red; font-weight:bold; margin-top:5px"></div></div>
      </div>
    </div>
    <div id='prod' class='panel hidden'><h3>📦 Produtos</h3><input id='pn' placeholder='Nome'><input id='pc' placeholder='Código'><input id='pp' type='number' placeholder='Preço'><input id='pe' type='number' placeholder='Estoque'><button onclick='addProd()'>💾 Salvar</button><div id='listP'></div></div>
    <div id='cli' class='panel hidden'><h3>👥 Clientes</h3><input id='cn' placeholder='Nome'><input id='cw' placeholder='WhatsApp'><button onclick='addCli()'>💾 Salvar</button><div id='listC'></div></div>
    <div id='pdv' class='panel hidden'><h3>🛒 PDV (F10 para finalizar)</h3><input id='scan' placeholder='Código...'><div id='carr-items'></div><h3 id='tot'>Total: R$0,00</h3><button onclick='finalizar()'>🖨️ Finalizar</button><h4>Histórico</h4><div id='pdv-ultimas-vendas'></div></div>
    <div id='rel' class='panel hidden'><h3>📊 Relatórios</h3><button onclick="exportarDB()">📥 Backup</button></div>
  </div>
</div>

<script>
let db = {p:[], c:[], v:[]};
try { db = JSON.parse(localStorage.getItem('db')) || db; } catch(e) { localStorage.removeItem('db'); }
let cart = [];

document.addEventListener('keydown', e => { if(e.key === 'F10') finalizar(); });
document.getElementById('scan').addEventListener('keypress', e => { if(e.key === 'Enter') addCarr(); });

function entrar(){ if(u.value==='anachic' && s.value==='1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } else alert('Erro'); }
function pg(i){ document.querySelectorAll('.panel, #dash').forEach(x=>x.classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); }
function save(){ localStorage.setItem('db', JSON.stringify(db)); render(); }

function addProd(){ db.p.push({n:pn.value, c:pc.value, p:parseFloat(pp.value||0), e:parseInt(pe.value||0)}); save(); }
function addCli(){ db.c.push({n:cn.value, w:cw.value}); save(); }
function addCarr(){ let p = db.p.find(x=>x.c == document.getElementById('scan').value.trim()); if(p && p.e > 0) { cart.push(p); p.e--; document.getElementById('scan').value=''; render(); } else alert("Produto indisponível!"); }

function finalizar(){
    if(cart.length === 0) return;
    let total = cart.reduce((a,b)=>a + parseFloat(b.p), 0);
    
    // Iframe para impressão isolada (evita loop)
    let ifr = document.createElement('iframe');
    ifr.style.display = 'none';
    document.body.appendChild(ifr);
    ifr.contentDocument.write(`<html><body><pre>ANACHIC\n${cart.map(i=>i.n).join('\n')}\nTOTAL: R$${total.toFixed(2)}</pre></body></html>`);
    ifr.contentDocument.close();
    ifr.contentWindow.print();
    
    setTimeout(() => { document.body.removeChild(ifr); db.v.push({data:new Date().toLocaleString(), total:total}); save(); cart=[]; render(); }, 1000);
}

function render(){
    cProd.innerText = db.p.length;
    let baixo = db.p.filter(p => parseInt(p.e) <= 2);
    document.getElementById('listaRepor').innerHTML = baixo.length > 0 ? baixo.map(p => `${p.n} (${p.e})`).join(', ') : "Tudo em dia! ✅";
    document.getElementById('carr-items').innerHTML = cart.map(i=>`<div>${i.n} - R$${i.p}</div>`).join('');
    document.getElementById('pdv-ultimas-vendas').innerHTML = db.v.slice(-3).reverse().map(v => `<div>${v.data.substring(11,16)} - R$${v.total.toFixed(2)}</div>`).join('');
}
render();
</script>
</body>
</html>
