<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}
.dashboard-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; }
.card-dash b { display:block; font-size:1.2em; color:var(--p); }
.list-item { background:#fff; padding:10px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; }
.del-btn { background:#ff4444; color:white; padding:4px 10px; font-size:12px; border-radius:5px; width:auto; margin:0; }
</style>
</head>
<body>

<div id='login' class='login'>
  <div class='box'>
    <h2>🌸 ANACHIC</h2>
    <input id='u' placeholder='Usuário'>
    <input id='s' type='password' placeholder='Senha'>
    <button onclick='entrar()'>Entrar 🔑</button>
  </div>
</div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
  </div>

  <div class='main'>
    <div id='dash'>
      <h3>🏠 Dashboard</h3>
      <div class='dashboard-container'>
        <div class='card-dash'>📦 Prod<b id='cProd'>0</b></div>
        <div class='card-dash'>👥 Cli<b id='cCli'>0</b></div>
        <div class='card-dash' style="cursor:pointer" onclick="pg('rel')">💰 Vendas<b id='cVendas'>0</b></div>
        <div class='card-dash'>💵 Fat<b id='cFat'>R$0,00</b></div>
        <div class='card-dash' style="grid-column: span 2">🎂 Aniversariantes<div id='listaAniv' style="font-weight:bold; color:#555; margin-top:5px"></div></div>
      </div>
    </div>

    <div id='prod' class='panel hidden'>
      <h3>📦 Produtos</h3>
      <input id='pn' placeholder='Nome do Produto'> <input id='pc' placeholder='Código'>
      <input id='pp' type='number' placeholder='Preço'> <input id='pe' type='number' placeholder='Estoque'>
      <button onclick='addProd()'>💾 Salvar Produto</button>
      <div id='listP' style="margin-top:15px"></div>
    </div>

    <div id='cli' class='panel hidden'>
      <h3>👥 Clientes</h3>
      <input id='cn' placeholder='Nome do Cliente'> <input id='cw' placeholder='WhatsApp'>
      <input id='ce' placeholder='Endereço'> <input id='cr' placeholder='Ponto de Referência'>
      <input id='ca' placeholder='Data de Nascimento (dd/mm)'>
      <button onclick='addCli()'>💾 Salvar Cliente</button>
      <div id='listC' style="margin-top:15px"></div>
    </div>

    <div id='pdv' class='panel hidden'>
      <h3>🛒 PDV</h3>
      <select id='selCli'></select>
      <input id='scan' placeholder='Código do produto...' onkeypress="if(event.key==='Enter') addCarr()">
      <div id='carr' style="background:#fff; padding:10px; margin:10px 0; border-radius:10px"></div>
      <select id='pag'><option>💳 Cartão</option><option>💵 Dinheiro</option><option>📱 PIX</option></select>
      <h3 id='tot'>Total: R$0,00</h3>
      <button onclick='finalizar()'>🖨️ Finalizar e Imprimir</button>
    </div>

    <div id='rel' class='panel hidden'><h3>📊 Relatório de Vendas</h3><div id='listV'></div></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[]}');
let cart = [];

function entrar(){ if(u.value==='Anachic'&&s.value==='1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } else alert('Erro'); }
function pg(i){ ['dash','prod','cli','pdv','rel'].forEach(x=>document.getElementById(x).classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); }
function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }

function addProd(){ if(!pn.value) return; db.p.push({n:pn.value,c:pc.value,p:parseFloat(pp.value||0),e:pe.value}); pn.value=''; pc.value=''; pp.value=''; pe.value=''; save(); }
function addCli(){ if(!cn.value) return; db.c.push({n:cn.value,w:cw.value,e:ce.value,r:cr.value,a:ca.value}); cn.value=''; cw.value=''; ce.value=''; cr.value=''; ca.value=''; save(); }
function del(t, i){ if(confirm('Excluir este item?')) { db[t].splice(i, 1); save(); } }
function addCarr(){ let p = db.p.find(x=>x.c==scan.value); if(p){ cart.push(p); scan.value=''; render(); } }

function finalizar(){
    if(cart.length === 0) return;
    let total = cart.reduce((a,b)=>a+parseFloat(b.p), 0);
    let c = db.c.find(x=>x.n == selCli.value) || {e:'N/A', r:'N/A', w:'N/A'};
    let itens = cart.map(i=> `${i.n} - R$${parseFloat(i.p).toFixed(2)}`).join('\n');
    let cupom = `ANACHIC MODA\n-----------------\nCLI: ${selCli.value}\nEND: ${c.e}\nREF: ${c.r}\nTEL: ${c.w}\n-----------------\n${itens}\n-----------------\nFORMA: ${pag.value}\nTOTAL: R$${total.toFixed(2)}`;
    db.v.push({data:new Date().toLocaleString(), total, cliente: selCli.value, itens: cart, pag: pag.value});
    save();
    let w = window.open("", "_blank", "width=300,height=600");
    w.document.write(`<html><head><style>body{font-family:monospace;width:58mm;font-size:12px}</style></head><body><pre>${cupom}</pre><script>window.onload=()=>{window.print();window.close();}<\/script></body></html>`);
    w.document.close();
    cart = []; render();
}

function render(){
    cProd.innerText = db.p.length; cCli.innerText = db.c.length; cVendas.innerText = db.v.length;
    cFat.innerText = 'R$' + db.v.reduce((a,b)=>a+b.total, 0).toFixed(2);
    listaAniv.innerText = db.c.filter(c=>c.a?.split('/')[1]===(new Date().getMonth()+1).toString().padStart(2,'0')).map(c=>c.n).join(', ') || "Nenhum";
    listP.innerHTML = db.p.map((p,i)=>`<div class='list-item'>${p.n} <button class='del-btn' onclick='del("p",${i})'>🗑️</button></div>`).join('');
    listC.innerHTML = db.c.map((c,i)=>`<div class='list-item'>${c.n} <button class='del-btn' onclick='del("c",${i})'>🗑️</button></div>`).join('');
    listV.innerHTML = db.v.map((v,i)=>`<div class='list-item'>${v.data.substring(0,10)} - ${v.cliente} <button class='del-btn' onclick='del("v",${i})'>🗑️</button></div>`).join('');
    selCli.innerHTML = '<option>Consumidor Final</option>' + db.c.map(c=>`<option>${c.n}</option>`).join('');
    carr.innerHTML = cart.map(i=>`<div>${i.n} - R$${parseFloat(i.p).toFixed(2)}</div>`).join('');
    tot.innerText = 'Total: R$' + cart.reduce((a,b)=>a+parseFloat(i.p),0).toFixed(2);
}
</script>
</body>
</html>
