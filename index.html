<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none !important}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}
.dashboard-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; border: none; cursor: pointer; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.card-dash span { font-size: 0.8em; color: #555; }
.card-dash b { display:block; font-size:1.2em; color:var(--p); margin-top: 5px; }
.list-item { background:#fff; padding:12px; margin-bottom:8px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; gap:10px; cursor:pointer; }
.prod-info { flex-grow: 1; overflow: hidden; }
.prod-details { display: flex; gap: 8px; margin-top: 5px; color: #555; font-size: 0.95em; font-weight: bold; }
.badge { background: #eee; padding: 2px 8px; border-radius: 5px; color: var(--d); font-size: 0.85em; }
.prod-img { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
.del-btn { background:#ff4444; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; }
.edit-btn { background:#4caf50; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; margin-right: 5px; }
.view-btn { background:#2196f3; color:white; padding:8px 12px; font-size:14px; border-radius:5px; border: none; cursor: pointer; flex-shrink: 0; width: auto; margin-right: 5px; }
.aniv-btn { background: #fce4ec; color: #e91e63; border: 1px solid #e91e63; padding: 5px 10px; border-radius: 5px; margin: 2px; cursor: pointer; font-size: 0.9em; }
.filter-btn { background: #31364b; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-right: 5px; font-size: 0.9em; }
.filter-btn.active { background: var(--p); }
.alert-box { background: #fff0f0; border-left: 5px solid #ff4444; padding: 10px; margin-top: 10px; color: #d32f2f; font-size: 0.9em; }
.panel { display: block; }
</style>
</head>
<body>

<div id='login' class='login'><div class='box'><h2>🌸 ANACHIC</h2><input id='u' placeholder='Usuário'><input id='s' type='password' placeholder='Senha'><button onclick='entrar()'>Entrar 🔑</button></div></div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
    <button onclick="pg('rank')">🏆 Ranking</button>
    <button onclick="pg('bak')">💾 Backup</button>
  </div>

  <div class='main'>
    <div id='dash' class='panel'><h3>🏠 Dashboard</h3>
        <div class='dashboard-container'>
            <button class='card-dash' onclick="pg('prod')"><span>📦 Produtos</span><b id='cProd'>0</b></button>
            <button class='card-dash' onclick="pg('cli')"><span>👥 Clientes</span><b id='cCli'>0</b></button>
            <button class='card-dash' onclick="pg('rel')"><span>📊 Vendas</span><b id='cVendas'>0</b></button>
            <button class='card-dash' onclick="pg('rel')"><span>💵 Faturamento</span><b id='cFat'>R$0,00</b></button>
            <button class='card-dash' style="grid-column: span 2;" onclick="alternarCaixa()"><span>💰 Status Caixa</span><b id='status-caixa'>Fechado</b></button>
        </div>
        <div id='alertaEstoque' class='alert-box' style='display:none'></div>
        <div id='listaAniv' style="margin-top:10px"></div>
    </div>
    
    <div id='prod' class='panel hidden'><h3>📦 Produtos</h3><input id='buscaProdGeral' placeholder='🔍 Buscar produto...' oninput='render()'><input id='pn' placeholder='Nome'><input id='pc' placeholder='Código'><input id='pp' type='number' placeholder='Preço'><input id='pe' type='number' placeholder='Estoque'><input type="file" id="pi" accept="image/*"><button onclick='addProd()'>💾 Salvar</button><div id='listP'></div></div>
    <div id='cli' class='panel hidden'><h3>👥 Clientes</h3><input id='cn' placeholder='Nome'><input id='cw' placeholder='WhatsApp'><input id='ce' placeholder='Endereço'><button onclick='addCli()'>💾 Salvar</button><div id='listC'></div></div>
    <div id='pdv' class='panel hidden'><h3>🛒 PDV</h3><input id='buscaCli' placeholder='🔍 Cliente...' oninput='render()'><select id='selCli'></select><input id='scan' placeholder='Código...' onkeypress="if(event.key==='Enter') addCarr()"><div id='carr-items'></div><h3 id='tot'>Total: R$0,00</h3><button onclick='finalizar()'>🖨️ Finalizar</button></div>
    <div id='rel' class='panel hidden'><h3>📊 Relatórios</h3><div id='listV'></div></div>
    <div id='rank' class='panel hidden'><h3>🏆 Ranking</h3><div id='listRank'></div></div>
    <div id='bak' class='panel hidden'><h3>💾 Backup</h3><button onclick="exportarDB()">📥 Backup</button><input type="file" id="importDB" onchange="importarDB(event)" style="display:none"><button onclick="document.getElementById('importDB').click()">📤 Restaurar</button></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[],"caixa":[]}');
if(!db.caixa) db.caixa = [];
let cart = [];

function entrar(){ if(u.value==='anachic' && s.value==='1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } }
function pg(i){ document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); render(); }
function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }

function alternarCaixa() {
    let aberto = db.caixa.find(c => !c.fim);
    if(aberto) { aberto.fim = new Date().toLocaleString(); alert("Caixa Fechado"); }
    else { let v = prompt("Valor inicial (Troco):"); if(v) db.caixa.push({inicio: new Date().toLocaleString(), val: v, fim: null}); }
    save();
}

function addProd(){ db.p.push({n:pn.value,c:pc.value,p:pp.value,e:pe.value}); save(); }
function addCli(){ db.c.push({n:cn.value,w:cw.value,e:ce.value}); save(); }
function addCarr(){ let p = db.p.find(x=>x.c==scan.value); if(p){ cart.push(p); scan.value=''; render(); } }
function finalizar(){ db.v.push({data:new Date().toLocaleString(), total: cart.reduce((a,b)=>a+parseFloat(b.p),0), itens: cart, cliente: selCli.value}); cart=[]; save(); alert("Venda finalizada!"); }
function del(t, i){ db[t].splice(i,1); save(); }
function exportarDB() { let a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)])); a.download="backup.json"; a.click(); }
function importarDB(e) { let r = new FileReader(); r.onload = (e) => { db = JSON.parse(e.target.result); save(); }; r.readAsText(e.target.files[0]); }

function render(){
    cProd.innerText = db.p.length; cCli.innerText = db.c.length; cVendas.innerText = db.v.length;
    document.getElementById('status-caixa').innerText = db.caixa.find(c => !c.fim) ? "Aberto" : "Fechado";
    document.getElementById('listP').innerHTML = db.p.map((p,i)=>`<div class='list-item'>${p.n} <b>R$${p.p}</b> <button class='del-btn' onclick='del("p",${i})'>X</button></div>`).join('');
    document.getElementById('carr-items').innerHTML = cart.map(i=>`<div>${i.n} - R$${i.p}</div>`).join('');
    document.getElementById('tot').innerText = 'Total: R$' + cart.reduce((a,b)=>a+parseFloat(b.p),0).toFixed(2);
    document.getElementById('listV').innerHTML = db.v.map(v=>`<div class='list-item'>${v.data} - R$${v.total.toFixed(2)}</div>`).join('');
}
render();
</script>
</body>
</html>
