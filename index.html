<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ANACHIC Moda Feminina V5.4 Pro</title>
<meta name="theme-color" content="#e91e63">
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--p))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px;box-shadow:0 15px 40px rgba(0,0,0,.2)}
input,select{width:100%;padding:11px;margin:6px 0;border:1px solid #ddd;border-radius:10px}
button{cursor:pointer;border:0;border-radius:10px;padding:11px}
.pink{background:var(--p);color:#fff; transition: 0.2s;}
.pink:hover{background:#d81557}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:250px;height:100%;background:var(--d);padding:20px;color:#fff}
.logo{font-size:24px;font-weight:700;color:#ff8fc0;margin-bottom:20px}
.sidebar button{width:100%;margin:5px 0;background:#31364b;color:#fff;text-align:left;}
.main{margin-left:270px;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.card-clicavel:hover{transform: scale(1.02); transition: 0.2s; cursor:pointer;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
th{background:#f8f8f8;padding:12px;text-align:left}
td{padding:12px;border-bottom:1px solid #eee}
.thumb{width:50px;height:50px;border-radius:8px;object-fit:cover}
</style>
</head>
<body>

<div id='login' class='login'>
  <div class='box'>
    <h2>🌸 ANACHIC</h2>
    <input id='u' placeholder='Usuário'>
    <input id='s' type='password' placeholder='Senha'>
    <button class='pink' style='width:100%' onclick='entrar()'>Entrar</button>
  </div>
</div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <div class='logo'>🌸 ANACHIC</div>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios Detalhados</button>
  </div>

  <div class='main'>
    <div id='dash'>
      <div class='cards'>
        <div class='card'>📦 Produtos<h2 id='tp'>0</h2></div>
        <div class='card'>👥 Clientes<h2 id='tc'>0</h2></div>
        <div class='card card-clicavel' onclick="pg('rel')">🧾 Vendas Realizadas<h2 id='tv'>0</h2></div>
        <div class='card'>💰 Faturamento Total<h2 id='tf'>R$0,00</h2></div>
      </div>
    </div>

    <div id='prod' class='panel hidden'>
      <h3>📦 Cadastro de Produtos</h3>
      <input id='pn' placeholder='Nome do Produto'>
      <input id='pc' placeholder='Código de Barras'>
      <input id='pp' type='number' placeholder='Preço de Venda'>
      <input id='pe' type='number' placeholder='Quantidade em Estoque'>
      <button class='pink' onclick='addProd()'>Salvar e Limpar</button>
      <div style="margin-top:20px; overflow-x:auto;"><table><tbody id='tbp'></tbody></table></div>
    </div>

    <div id='cli' class='panel hidden'>
      <h3>👥 Cadastro de Clientes</h3>
      <input id='cn' placeholder='Nome Completo'>
      <input id='cw' placeholder='WhatsApp'>
      <input id='ce' placeholder='Endereço'>
      <input id='cr' placeholder='Referência'>
      <button class='pink' onclick='addCli()'>Salvar Cliente</button>
      <div id='lcli'></div>
    </div>

    <div id='pdv' class='panel hidden'>
      <h3>🛒 Ponto de Venda</h3>
      <select id='clientePDV'></select>
      <input id='scan' placeholder='Bipe o código ou digite e dê Enter' onkeypress="if(event.key==='Enter') addCarr()">
      <div id='cart' style='margin:15px 0;'></div>
      <h3>Total: <span id='tot' style='color:var(--p)'>R$0,00</span></h3>
      <select id='pag'><option>PIX</option><option>Dinheiro</option><option>Cartão</option></select>
      <button class='pink' style='width:100%; font-size:18px' onclick='finalizar()'>✅ Finalizar e Limpar Venda</button>
    </div>

    <div id='rel' class='panel hidden'>
      <h3>📊 Relatório Completo de Vendas</h3>
      <div id='relv'></div>
    </div>
  </div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem('ap')||'[]');
let clientes = JSON.parse(localStorage.getItem('ac')||'[]');
let vendas = JSON.parse(localStorage.getItem('av')||'[]');
let carr = [];

function entrar(){
  if(u.value==='Anachic'&&s.value==='1234'){
    login.classList.add('hidden');
    app.classList.remove('hidden');
    render();
  } else alert('Usuário ou senha incorretos');
}

function pg(i){
  ['dash','prod','cli','pdv','rel'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(i).classList.remove('hidden');
}

function save(){
  localStorage.setItem('ap',JSON.stringify(produtos));
  localStorage.setItem('ac',JSON.stringify(clientes));
  localStorage.setItem('av',JSON.stringify(vendas));
  render();
}

function addProd(){
  if(!pn.value || !pp.value) return alert("Preencha Nome e Preço!");
  produtos.push({id:Date.now(),n:pn.value,c:pc.value,p:+pp.value,e:+pe.value});
  // Limpar campos após salvar
  pn.value=''; pc.value=''; pp.value=''; pe.value='';
  save();
  alert('Produto salvo!');
}

function addCli(){
  clientes.push({n:cn.value,w:cw.value,e:ce.value,r:cr.value});
  cn.value=''; cw.value=''; ce.value=''; cr.value='';
  save();
}

function addCarr(){
  let p = produtos.find(x => x.c === scan.value);
  if(p && p.e > 0){
    carr.push({...p, q:1});
    scan.value = '';
    renderCarr();
  }
}

function renderCarr(){
  cart.innerHTML = carr.map((item,i) => `<div>${item.n} - R$${item.p}</div>`).join('');
  tot.innerText = 'R$' + carr.reduce((a,b)=>a+b.p, 0).toFixed(2);
}

function finalizar(){
  if(carr.length === 0) return;
  let total = carr.reduce((a,b)=>a+b.p, 0);
  vendas.push({
    data: new Date().toLocaleString(),
    total: total,
    itens: carr,
    cliente: clientePDV.options[clientePDV.selectedIndex].text,
    pag: pag.value
  });
  
  // Limpa o carrinho e o PDV
  carr = [];
  renderCarr();
  clientePDV.selectedIndex = 0;
  
  save();
  alert("Venda finalizada com sucesso!");
}

function render(){
  tp.innerText = produtos.length;
  tc.innerText = clientes.length;
  tv.innerText = vendas.length;
  tf.innerText = 'R$' + vendas.reduce((a,b)=>a+b.total, 0).toFixed(2);

  tbp.innerHTML = produtos.map(p => `<tr><td>${p.n}</td><td>${p.c}</td><td>R$${p.p}</td><td>${p.e}</td></tr>`).join('');
  
  clientePDV.innerHTML = '<option>Consumidor Final</option>' + clientes.map(c => `<option>${c.n}</option>`).join('');

  relv.innerHTML = vendas.slice().reverse().map(v => `
    <div class='card' style='margin-bottom:15px'>
      <b>Data:</b> ${v.data} | <b>Cliente:</b> ${v.cliente} | <b>Pag:</b> ${v.pag}
      <br><b>Itens:</b> ${v.itens.map(i=>i.n).join(', ')}
      <br><h3 style='margin:5px 0'>Total: R$${v.total.toFixed(2)}</h3>
    </div>
  `).join('');
}
</script>
</body>
</html>
