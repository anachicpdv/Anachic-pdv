
<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}

/* DASHBOARD */
.dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card-dash { background:#fff; padding:15px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; border: 1px solid #eee; }
.card-dash b { display:block; font-size:1.4em; color:var(--p); }

/* LISTAS E LIXEIRAS (O ponto que você pediu para corrigir) */
.list-item { background:#fff; padding:10px; margin-bottom:8px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; }
.prod-img { width: 45px; height: 45px; object-fit: cover; border-radius: 5px; }
.qty-btn { background:#eee; color:#333; padding:5px 12px; border-radius:5px; border:none; font-weight:bold; }
.del-btn { background:#ff4444; color:white; padding:5px 12px; border-radius:5px; border:none; cursor:pointer; flex-shrink: 0; margin-left: 10px; }
</style>
</head>
<body>

<div id='login' class='login'>
  <div class='box'>
    <h2>🌸 ANACHIC</h2>
    <input id='u' placeholder='Usuário'>
    <input id='s' type='password' placeholder='Senha'>
    <button onclick='entrar()'>Entrar 🔑</button>
  </div>
</div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
  </div>

  <div class='main'>
    <div id='dash'>
      <h3>🏠 Dashboard</h3>
      <div class='dashboard-container'>
        <div class='card-dash'>Produtos<b id='cProd'>0</b></div>
        <div class='card-dash'>Clientes<b id='cCli'>0</b></div>
        <div class='card-dash'>Vendas<b id='cVendas'>0</b></div>
        <div class='card-dash'>Faturamento<b id='cFat'>R$0,00</b></div>
        <div class='card-dash' style="grid-column: span 2;">🎂 Aniversariantes<div id='listaAniv' style="margin-top:5px"></div></div>
      </div>
    </div>

    <div id='prod' class='panel hidden'>
      <h3>📦 Produtos</h3>
      <input id='pn' placeholder='Nome'> <input id='pc' placeholder='Código'>
      <input id='pp' type='number' placeholder='Preço'> <input id='pe' type='number' placeholder='Estoque'>
      <input type="file" id="pi" accept="image/*">
      <button onclick='addProd()'>💾 Salvar Produto</button>
      <div id='listP' style="margin-top:15px"></div>
    </div>

    <div id='cli' class='panel hidden'>
      <h3>👥 Clientes</h3>
      <input id='cn' placeholder='Nome'> <input id='cw' placeholder='WhatsApp'>
      <input id='ce' placeholder='Endereço'> <input id='cr' placeholder='Ponto de Referência'>
      <input id='ca' placeholder='Data (dd/mm)'>
      <button onclick='addCli()'>💾 Salvar Cliente</button>
      <div id='listC' style="margin-top:15px"></div>
    </div>

    <div id='pdv' class='panel hidden'>
      <h3>🛒 PDV</h3>
      <select id='selCli'></select>
      <div style="display:flex; gap:5px;"><input id='scan' placeholder='Código...'><button onclick='addCarr()' style="width:100px; margin-top:5px">OK</button></div>
      <div id='carr' style="background:#fff; padding:10px; margin:10px 0; border-radius:10px"></div>
      <select id='pag'><option>💳 Cartão</option><option>💵 Dinheiro</option><option>📱 PIX</option></select>
      <h3 id='tot'>Total: R$0,00</h3>
      <button onclick='finalizar()'>🖨️ Finalizar e Imprimir</button>
    </div>

    <div id='rel' class='panel hidden'><h3>📊 Relatórios</h3><div id='listV'></div></div>
  </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[]}');
let cart = [];
function entrar(){ if(u.value==='Anachic'&&s.value==='1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } else alert('Erro'); }
function pg(i){ ['dash','prod','cli','pdv','rel'].forEach(x=>document.getElementById(x).classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); }
function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }
function addProd(){ 
    let f = document.getElementById('pi').files[0];
    if(!pn.value) return;
    if(f){ let r = new FileReader(); r.onload = (e) => { db.p.push({n:pn.value,c:pc.value,p:pp.value,e:pe.value,i:e.target.result}); save(); }; r.readAsDataURL(f); }
    else { db.p.push({n:pn.value,c:pc.value,p:pp.value,e:pe.value,i:''}); save(); }
}
function addCli(){ db.c.push({n:cn.value,w:cw.value,e:ce.value,r:cr.value,a:ca.value}); save(); }
function del(t, i){ if(confirm('Excluir?')) { db[t].splice(i, 1); save(); } }
function addCarr(){ let p = db.p.find(x=>x.c == scan.value); if(p){ cart.push({...p, q:1}); scan.value=''; render(); } else alert("Não encontrado"); }
function updateQty(c, d){ let i = cart.find(x=>x.c == c); if(i){ i.q += d; if(i.q<=0) cart=cart.filter(x=>x.c!=c); render(); } }
function delCart(c){ cart=cart.filter(x=>x.c!=c); render(); }
function finalizar(){
    let total = cart.reduce((a,b)=>a+(b.p*b.q),0);
    db.v.push({data:new Date().toLocaleString(), total:total, cliente:selCli.value, itens:cart});
    save(); cart=[]; render(); alert("Venda finalizada!");
}
function render(){
    cProd.innerText = db.p.length; cCli.innerText = db.c.length; cVendas.innerText = db.v.length;
    cFat.innerText = 'R$' + db.v.reduce((a,b)=>a+parseFloat(b.total), 0).toFixed(2);
    listaAniv.innerText = db.c.filter(c=>c.a?.split('/')[1]===(new Date().getMonth()+1).toString().padStart(2,'0')).map(c=>c.n).join(', ') || "Nenhum";
    listP.innerHTML = db.p.map((p,i)=>`<div class='list-item'><img src='${p.i||""}' class='prod-img'> <div>${p.n}</div> <button class='del-btn' onclick='del("p",${i})'>🗑️</button></div>`).join('');
    listC.innerHTML = db.c.map((c,i)=>`<div class='list-item'>${c.n} <button class='del-btn' onclick='del("c",${i})'>🗑️</button></div>`).join('');
    carr.innerHTML = cart.map(i=>`<div class='list-item'>${i.n} <div style="display:flex;align-items:center;gap:5px"><button class='qty-btn' onclick='updateQty("${i.c}",-1)'>-</button> ${i.q} <button class='qty-btn' onclick='updateQty("${i.c}",1)'>+</button> <button class='del-btn' onclick='delCart("${i.c}")'>🗑️</button></div></div>`).join('');
    tot.innerText = 'Total: R$' + cart.reduce((a,b)=>a+(b.p*b.q),0).toFixed(2);
}
</script>
</body>
</html>
