<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>🌸 ANACHIC Pro</title>
<style>
:root{--p:#e91e63;--d:#202433;--bg:#f4f6fb}
*{box-sizing:border-box;font-family:sans-serif}
body{margin:0;background:var(--bg)}
.login{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff6cab,var(--d))}
.box{background:#fff;padding:30px;border-radius:20px;width:340px}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px}
button{cursor:pointer;border:0;border-radius:8px;padding:10px;background:var(--p);color:#fff;width:100%;margin-top:10px}
.hidden{display:none}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:var(--d);padding:20px;color:#fff}
.sidebar button{background:#31364b;text-align:left;margin-bottom:5px;border:none;color:white;width:100%;padding:10px;cursor:pointer}
.main{margin-left:220px;padding:20px}

/* DASHBOARD CORRIGIDO */
.dashboard-container { display: flex; flex-direction: column; gap: 10px; width: 100%; }
.card-dash { 
    background:#fff; padding:15px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); 
    border: 1px solid #ddd; cursor: pointer; display: flex; justify-content: space-between; 
    align-items: center; font-size: 15px; font-weight: bold; color: #333; width: 100%;
}
.card-dash b { font-size:1.1em; color:var(--p); }

/* LISTAS E LIXEIRAS OTIMIZADAS */
.list-item { background:#fff; padding:8px; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee; font-size: 14px; }
.prod-img { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; margin-right: 10px; }
.qty-btn { background:#eee; color:#333; padding:2px 8px; border-radius:5px; cursor:pointer; font-weight:bold; font-size:12px; border:none; }
.del-btn { background:#ff4444; color:white; padding:5px 8px; font-size:12px; border-radius:5px; border:none; cursor:pointer; }
</style>
</head>
<body>

<div id='login' class='login'>
  <div class='box'>
    <h2>🌸 ANACHIC</h2>
    <input id='u' placeholder='Usuário'>
    <input id='s' type='password' placeholder='Senha'>
    <button onclick='entrar()'>Entrar 🔑</button>
  </div>
</div>

<div id='app' class='hidden'>
  <div class='sidebar'>
    <h3>🌸 ANACHIC</h3>
    <button onclick="pg('dash')">🏠 Dashboard</button>
    <button onclick="pg('prod')">📦 Produtos</button>
    <button onclick="pg('cli')">👥 Clientes</button>
    <button onclick="pg('pdv')">🛒 PDV</button>
    <button onclick="pg('rel')">📊 Relatórios</button>
  </div>

  <div class='main'>
    <div id='dash'>
      <h3>🏠 Dashboard</h3>
      <div class='dashboard-container'>
        <button class='card-dash' onclick="pg('prod')">Produtos<b id='cProd'>0</b></button>
        <button class='card-dash' onclick="pg('cli')">Clientes<b id='cCli'>0</b></button>
        <button class='card-dash' onclick="pg('rel')">Vendas<b id='cVendas'>0</b></button>
        <button class='card-dash' onclick="pg('rel')">Faturamento<b id='cFat'>R$0,00</b></button>
        <div class='card-dash' style="flex-direction: column; cursor: default; align-items: flex-start;">
            <span>🎂 Aniversariantes</span>
            <div id='listaAniv' style="font-weight:normal; color:#555; margin-top:5px"></div>
        </div>
      </div>
    </div>

    <!-- Divs de Produtos, Clientes, PDV e Relatórios (Mesma lógica) -->
    <div id='prod' class='panel hidden'>
        <h3>📦 Produtos</h3>
        <input id='pn' placeholder='Nome'> <input id='pc' placeholder='Código'>
        <input id='pp' type='number' placeholder='Preço'> <input id='pe' type='number' placeholder='Estoque'>
        <input type="file" id="pi" accept="image/*">
        <button onclick='addProd()'>💾 Salvar Produto</button>
        <div id='listP' style="margin-top:15px"></div>
    </div>
    <div id='cli' class='panel hidden'>
        <h3>👥 Clientes</h3>
        <input id='cn' placeholder='Nome'> <input id='cw' placeholder='WhatsApp'>
        <input id='ca' placeholder='Data de Nascimento (dd/mm)'>
        <button onclick='addCli()'>💾 Salvar</button>
        <div id='listC' style="margin-top:15px"></div>
    </div>
    <div id='pdv' class='panel hidden'>
        <h3>🛒 PDV</h3>
        <select id='selCli'></select>
        <div style="display:flex; gap:5px;"><input id='scan' placeholder='Código...'><button onclick='addCarr()' style="width:100px; margin-top:5px">OK</button></div>
        <div id='carr' style="background:#fff; padding:10px; margin:10px 0; border-radius:10px"></div>
        <select id='pag'><option>💳 Cartão</option><option>💵 Dinheiro</option></select>
        <h3 id='tot'>Total: R$0,00</h3>
        <button onclick='finalizar()'>🖨️ Finalizar</button>
    </div>
    <div id='rel' class='panel hidden'><h3>📊 Relatórios</h3><div id='listV'></div></div>
  </div>
</div>

<script>
// Mantendo a lógica funcional do script anterior
let db = JSON.parse(localStorage.getItem('db')||'{"p":[],"c":[],"v":[]}');
let cart = [];
function entrar(){ if(u.value==='Anachic'&&s.value==='1234'){ login.classList.add('hidden'); app.classList.remove('hidden'); render(); } else alert('Erro'); }
function pg(i){ ['dash','prod','cli','pdv','rel'].forEach(x=>document.getElementById(x).classList.add('hidden')); document.getElementById(i).classList.remove('hidden'); }
function save(){ localStorage.setItem('db',JSON.stringify(db)); render(); }
function addProd(){ 
    let file = document.getElementById('pi').files[0];
    if(!pn.value) return;
    if(file) {
        let reader = new FileReader();
        reader.onload = function(e) { db.p.push({n:pn.value,c:pc.value,p:pp.value,e:pe.value,i:e.target.result}); save(); clearProd(); };
        reader.readAsDataURL(file);
    } else { db.p.push({n:pn.value,c:pc.value,p:pp.value,e:pe.value,i:''}); save(); clearProd(); }
}
function clearProd(){ pn.value=''; pc.value=''; pp.value=''; pe.value=''; document.getElementById('pi').value=''; }
function addCli(){ if(!cn.value) return; db.c.push({n:cn.value,w:cw.value,a:ca.value}); save(); }
function del(t, i){ if(confirm('Excluir?')) { db[t].splice(i, 1); save(); } }
function addCarr(){ let p = db.p.find(x=>x.c == scan.value); if(p){ cart.push({...p, q: 1}); scan.value=''; render(); } }
function updateQty(code, delta){ let item = cart.find(i => i.c == code); if(item) { item.q += delta; if(item.q <= 0) cart = cart.filter(i => i.c !== code); render(); } }
function delCart(code){ cart = cart.filter(i=>i.c !== code); render(); }
function render(){
    cProd.innerText = db.p.length; cCli.innerText = db.c.length; cVendas.innerText = db.v.length;
    cFat.innerText = 'R$' + db.v.reduce((a,b)=>a+parseFloat(b.total), 0).toFixed(2);
    listP.innerHTML = db.p.map((p,i)=>`<div class='list-item'><img src='${p.i||""}' class='prod-img'> <span>${p.n}</span> <button class='del-btn' onclick='del("p",${i})'>🗑️</button></div>`).join('');
    listC.innerHTML = db.c.map((c,i)=>`<div class='list-item'>${c.n} <button class='del-btn' onclick='del("c",${i})'>🗑️</button></div>`).join('');
    carr.innerHTML = cart.map(i=>`<div class='list-item'>${i.n} <div style="display:flex;align-items:center;gap:5px"><button class='qty-btn' onclick='updateQty("${i.c}",-1)'>-</button> ${i.q} <button class='qty-btn' onclick='updateQty("${i.c}",1)'>+</button> <button class='del-btn' onclick='delCart("${i.c}")'>🗑️</button></div></div>`).join('');
}
</script>
</body>
</html>
